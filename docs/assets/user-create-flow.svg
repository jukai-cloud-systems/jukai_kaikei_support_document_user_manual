  <rect x="80" y="150" width="280" height="160" rx="16" fill="#fff" stroke="#444" stroke-width="3"/>
  <text x="220" y="210" font-size="28" text-anchor="middle" fill="#222">1. 管理者が作成</text>
  <text x="220" y="255" font-size="22" text-anchor="middle" fill="#666">ユーザーID</text>
  <text x="220" y="288" font-size="22" text-anchor="middle" fill="#666">メール</text>
